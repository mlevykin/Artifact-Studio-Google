<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f5;
            color: #27272a;
        }
        .loader {
            border: 3px solid #e4e4e7;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p id="status">Completing authentication...</p>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');

        if (window.opener) {
            if (error) {
                window.opener.postMessage({ type: 'MCP_OAUTH_ERROR', error, state }, window.location.origin);
                document.getElementById('status').textContent = 'Authentication failed: ' + error;
            } else if (code) {
                window.opener.postMessage({ type: 'MCP_OAUTH_SUCCESS', code, state }, window.location.origin);
                document.getElementById('status').textContent = 'Authentication successful! Closing window...';
            }
            setTimeout(() => window.close(), 2000);
        } else {
            document.getElementById('status').textContent = 'No opener window found. Please close this tab and try again.';
        }
    </script>
</body>
</html>
